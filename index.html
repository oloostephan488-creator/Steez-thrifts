<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steez Thrift | Official Hub</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --card: #121212; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        /* Header Section */
        .header { padding: 80px 20px 40px; background: linear-gradient(180deg, rgba(0,255,65,0.1) 0%, var(--bg) 100%); }
        .brand-name { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; margin: 0; line-height: 0.9; text-transform: uppercase; color: var(--accent); }
        .tagline { font-size: 0.7rem; letter-spacing: 4px; color: #888; margin-top: 10px; font-weight: bold; }

        .container { padding: 20px; max-width: 400px; margin: auto; }
        
        /* The Links */
        .hub-link {
            display: flex;
            align-items: center;
            background: var(--card);
            color: white;
            text-decoration: none;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #222;
            transition: 0.2s;
            text-align: left;
        }
        .hub-link:active { transform: scale(0.96); border-color: var(--accent); background: #1a1a1a; }
        .icon { font-size: 1.4rem; margin-right: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; }
        .text b { display: block; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .text span { font-size: 0.75rem; color: #666; }

        /* VIP Button */
        .featured { background: var(--accent); border: none; color: black !important; font-weight: 900; justify-content: center; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,255,65,0.2); }
        .featured b { font-size: 1.1rem; }

        .footer { margin-top: 50px; padding-bottom: 30px; font-size: 0.6rem; color: #333; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand-name">STEEZ<br>THRIFT</h1>
        <p class="tagline">PREMIUM DRIP • NAIROBI</p>
    </div>

    <div class="container">
        
        <a href="https://wa.me/254701018284?text=Yo%20Bravo!%20I'm%20from%20the%20Hub.%20Show%20me%20what's%20in%20stock%20🔥" class="hub-link">
            <span class="icon">🛍️</span>
            <div class="text">
                <b>Browse Catalog</b>
                <span>Chat directly with Bravo</span>
            </div>
        </a>

        <a href="https://www.instagram.com/steez_thrift01?igsh=bXNxbDdhZmszeHQx" class="hub-link">
            <span class="icon">📸</span>
            <div class="text">
                <b>Official Lookbook</b>
                <span>Follow @steez_thrift01</span>
            </div>
        </a>

        <a href="https://wa.me/254701018284?text=Hi%20Bravo,%20I'd%20like%20to%20know%20shipping%20rates%20to%20my%20location" class="hub-link">
            <span class="icon">🚚</span>
            <div class="text">
                <b>Delivery Info</b>
                <span>Nationwide Shipping & Pickups</span>
            </div>
        </a>

        <a href="https://wa.me/254701018284?text=Yo%20Bravo!%20I%20have%20an%20order%20ready" class="hub-link featured">
            <b>PLACE AN ORDER ⚡</b>
        </a>

    </div>

    <div class="footer">
        DEVELOPED BY STEPHAN CREATOR
    </div>

</body>
</html>
